services:
  - type: web
    name: task-manager-backend
    env: python
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"
    # 🔥 To keep SQLite data, add a disk in Render Dashboard:
    # Name: data, Mount Path: /data, Size: 1GB
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: GOOGLE_CREDS_JSON
        sync: false   # You will paste this manually in Render dashboard
